name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the code
    - uses: actions/checkout@v4

    # 2. Set up Java environment (Required for Android builds)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Grant execute permission to the Gradle wrapper
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Build the Debug APK
    # Note: Use 'assembleRelease' and configure signing if you need a release build
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Upload the generated APK as an artifact
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
